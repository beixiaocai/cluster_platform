<style>
.global-node-selector {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    padding: 0 15px !important;
    height: 57px !important;
    float: right !important;
}

.node-selector-wrapper {
    display: flex;
    align-items: center;
    background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
    border: 1px solid #86efac;
    border-radius: 20px;
    padding: 6px 12px;
    transition: all 0.3s ease;
    cursor: pointer;
}

.node-selector-wrapper:hover {
    background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
    border-color: #4ade80;
    box-shadow: 0 2px 8px rgba(134, 239, 172, 0.4);
}

.node-icon {
    color: #22c55e;
    font-size: 14px;
    margin-right: 8px;
    transition: transform 0.3s ease;
}

.node-selector-wrapper:hover .node-icon {
    transform: scale(1.1);
}

.node-select {
    border: none;
    background: transparent;
    font-size: 13px;
    color: #166534;
    font-weight: 500;
    cursor: pointer;
    outline: none;
    min-width: 120px;
    padding-right: 5px;
}

.node-select:focus {
    outline: none;
}

.node-select option {
    background: #fff;
    color: #333;
    padding: 8px;
}
</style>

<script>
window.GlobalNodeManager = {
    STORAGE_KEY: 'cp_server_global_node',
    
    init: function() {
        this.loadNodes();
        this.bindEvents();
    },
    
    loadNodes: function() {
        var self = this;
        jQuery.ajax({
            url: '/open/getNodeList',
            type: 'GET',
            success: function(res) {
                if (res.code === 0 && res.data) {
                    self.renderNodeSelect(res.data);
                }
            },
            error: function() {
                console.error('Failed to load node list');
            }
        });
    },
    
    renderNodeSelect: function(nodes) {
        var $select = jQuery('#global_node_select');
        var currentNode = this.getCurrentNode();
        
        $select.empty();
        $select.append('<option value="">请选择节点</option>');
        
        for (var i = 0; i < nodes.length; i++) {
            var node = nodes[i];
            var selected = (currentNode && currentNode.code === node.code) ? 'selected' : '';
            $select.append('<option value="' + node.code + '" ' + selected + '>' + (node.nickname || node.code) + '</option>');
        }
        
        if (currentNode) {
            $select.val(currentNode.code);
        }
    },
    
    bindEvents: function() {
        var self = this;
        
        jQuery('#global_node_select').on('change', function() {
            var code = jQuery(this).val();
            var name = jQuery(this).find('option:selected').text();
            
            if (code) {
                self.setCurrentNode(code, name);
                self.notifyNodeChange(code, name);
            } else {
                self.clearCurrentNode();
            }
        });
    },
    
    getCurrentNode: function() {
        try {
            var data = localStorage.getItem(this.STORAGE_KEY);
            return data ? JSON.parse(data) : null;
        } catch (e) {
            return null;
        }
    },
    
    setCurrentNode: function(code, name) {
        var data = {
            code: code,
            name: name,
            timestamp: Date.now()
        };
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
    },
    
    clearCurrentNode: function() {
        localStorage.removeItem(this.STORAGE_KEY);
    },
    
    notifyNodeChange: function(code, name) {
        var event = new CustomEvent('globalNodeChanged', {
            detail: { code: code, name: name }
        });
        window.dispatchEvent(event);
        
        jQuery.toast({
            heading: '节点切换',
            text: '已切换到节点: ' + name,
            icon: 'success',
            position: 'top-right',
            hideAfter: 2000
        });
    }
};

(function() {
    function initGlobalNodeManager() {
        if (window.jQuery) {
            window.GlobalNodeManager.init();
        } else {
            setTimeout(initGlobalNodeManager, 100);
        }
    }
    initGlobalNodeManager();
})();
</script>
