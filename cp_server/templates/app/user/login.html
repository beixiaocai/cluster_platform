<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="image/png" href="/static/images/logo.png?123456" rel="shortcut icon" />
    <title>登录 | 集群管理平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 360px;
        }
        .login-card {
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-logo {
            width: 48px;
            height: 48px;
            background: #3b82f6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .login-logo svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        .login-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .login-subtitle {
            font-size: 13px;
            color: #888;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s ease;
            background: #fafafa;
            color: #333;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #fff;
        }
        .form-input::placeholder {
            color: #aaa;
        }
        .captcha-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .captcha-row .form-input {
            flex: 1;
        }
        .captcha-img {
            width: 90px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            object-fit: cover;
            background: #eee;
        }
        .btn-login {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 4px;
        }
        .btn-login:hover {
            background: #2563eb;
        }
        .login-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }
        .footer-copyright {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 12px;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            color: #666;
        }
        .social-btn:hover {
            color: #3b82f6;
            background: #f5f5f5;
        }
        @media (max-width: 480px) {
            .login-card {
                padding: 24px 20px;
            }
            .login-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                </div>
                <h1 class="login-title">集群管理平台</h1>
                <p class="login-subtitle">cluster_platform</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" name="username" class="form-input" placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-input" placeholder="请输入密码">
                </div>
                
                <div class="form-group" id="captchaGroup" {% if isEnableLoginCaptcha != 1 %}style="display: none;"{% endif %}>
                    <label class="form-label">验证码</label>
                    <div class="captcha-row">
                        <input type="text" name="captcha" class="form-input" placeholder="请输入验证码">
                        <img id="imgCaptcha" class="captcha-img" src="/static/images/loading.gif" alt="验证码">
                    </div>
                </div>
                
                <button type="submit" class="btn-login">登 录</button>
            </form>
            
            <div class="login-footer">
                <div class="footer-copyright">
                    © 2024-2026 cluster_platform · v{{project_version}}
                </div>
                <div class="social-links">
                    <a href="https://github.com/beixiaocai/cluster_platform" target="_blank" class="social-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        GitHub
                    </a>
                    <a href="https://gitee.com/Vanishi/cluster_platform" target="_blank" class="social-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M11.984 0A12.001 12.001 0 0 0 0 11.984 11.984 23.969 23.969 11.984 11.984 0 11.984 0ZM8.508 4.75c1.93 0 3.625 1.875 3.625 3.75s-1.695 3.75-3.625 3.75-3.633-1.875-3.633-3.75 1.703-3.75 3.633-3.75zm9.984 0c1.93 0 3.625 1.875 3.625 3.75s-1.695 3.75-3.625 3.75-3.633-1.875-3.633-3.75 1.703-3.75 3.633-3.75zm-9.984 8.75c1.93 0 3.625 1.875 3.625 3.75s-1.695 3.75-3.625 3.75-3.633-1.875-3.633-3.75 1.703-3.75 3.633-3.75z"/>
                        </svg>
                        Gitee
                    </a>
                </div>
            </div>
        </div>
    </div>

<script src="/static/lib/jquery/jquery.min.js"></script>
<link href="/static/lib/jquery/toast/1.3.2/jquery.toast.css?v=2" rel="stylesheet">
<script src="/static/lib/jquery/toast/1.3.2/jquery.toast.min.js"></script>
<script src="/static/lib/jquery/toast/1.3.2/toast.js"></script>
<script src="/static/lib/jsencrypt/3.3.1/jsencrypt.min.js"></script>
<script>
    let publicKey = '{{ loginPublicKey }}';
    let isEnableLoginCaptcha = parseInt("{{ isEnableLoginCaptcha }}");
    
    function f_login() {
        let username = $("input[name='username']").val().trim();
        let password = $("input[name='password']").val().trim();
        
        if (!username) {
            myAlert("请输入用户名", "error");
            return false;
        }
        if (username.length < 3) {
            myAlert("用户名格式不正确", "error");
            return false;
        }
        if (!password) {
            myAlert("请输入密码", "error");
            return false;
        }
        if (password.length < 3) {
            myAlert("密码格式不正确", "error");
            return false;
        }
        
        let captcha = "";
        if (isEnableLoginCaptcha === 1) {
            captcha = $("input[name='captcha']").val().trim();
            if (!captcha) {
                myAlert("请输入验证码", "error");
                return false;
            }
        }
        
        let encryptor = new JSEncrypt();
        encryptor.setPublicKey(publicKey);
        let usernameS = encryptor.encrypt(username);
        let passwordS = encryptor.encrypt(password);
        
        let requestData = {
            "username_s": usernameS,
            "password_s": passwordS
        };
        
        if (isEnableLoginCaptcha === 1) {
            requestData.captcha = captcha;
        }
        
        $.ajax({
            url: '/login',
            type: "post",
            data: requestData,
            dataType: "json",
            timeout: 0,
            error: function() {
                myAlert("网络异常，请确定网络正常！", "error");
            },
            success: function(res) {
                if (res.code === 1000) {
                    window.location.href = "/";
                } else {
                    myAlert(res.msg, "error", 1000);
                }
            }
        });
    }
    
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        f_login();
    });
    
    document.onkeydown = function(e) {
        let code = e.keyCode || e.which;
        if (code === 13) {
            f_login();
        }
    };
    
    if (isEnableLoginCaptcha === 1) {
        let imgCaptcha = document.getElementById('imgCaptcha');
        function updateCaptcha() {
            imgCaptcha.src = '/captcha?' + new Date().getTime();
        }
        imgCaptcha.addEventListener('click', updateCaptcha);
        setTimeout(updateCaptcha, 10);
    }
</script>
</body>
</html>
